services:
  - type: web
    name: beloren-raid-dashboard
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WARCRAFT_LOGS_CLIENT_ID
        sync: false
      - key: WARCRAFT_LOGS_CLIENT_SECRET
        sync: false
